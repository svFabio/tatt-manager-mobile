name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'       
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
        continue-on-error: true
      - run: npx expo prebuild --platform android --clean
        continue-on-error: true
