name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true # Allow to continue if there are existing type errors

      - name: Build verification (Expo prebuild)
        run: npx expo prebuild --platform android --clean
        continue-on-error: true # Allow to continue if build has issues

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify EAS Project
        run: |
          echo "Verifying EAS project configuration..."
          cat .eas/project.json

      - name: Build Android APK
        run: eas build --platform android --profile production --non-interactive

  deploy-staging:
    name: Deploy to Expo Staging
    runs-on: ubuntu-latest
    needs: test
    if: (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/dev') && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify EAS Project
        run: |
          echo "Verifying EAS project configuration..."
          cat .eas/project.json

      - name: Deploy to Expo
        run: eas update --channel staging --auto --non-interactive