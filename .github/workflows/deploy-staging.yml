name: Deploy Staging

on:
  push:
    branches:
      - dev

jobs:
  deploy-staging:
    name: Deploy to Expo Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'       
          cache: 'npm'
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npx expo install expo-updates
      - run: eas update:configure --non-interactive
      - name: Deploy to Expo
        run: eas update --channel staging --auto --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: '1'
